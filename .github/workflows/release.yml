name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift run UsageCoreTests

      - name: Build DMG
        env:
          # Set these repository secrets to produce a signed, notarizable build.
          # Leave unset for an ad-hoc-signed DMG (users right-click → Open once).
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: ./scripts/make-dmg.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageTracker-dmg
          path: build/ClaudeUsageTracker.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeUsageTracker.dmg
          generate_release_notes: true
